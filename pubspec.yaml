name: fravaer_app
description: "Alle med — fraværsverktøy for lærere"
publish_to: 'none'
version: 1.0.1+2
# version format: major.minor.patch+buildNumber
# Increment buildNumber for each Play Store upload

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (drift + SQLCipher for encrypted SQLite)
  drift: ^2.22.1
  sqlcipher_flutter_libs: ^0.6.5
  sqlite3: ^2.4.6
  path_provider: ^2.1.5
  path: ^1.9.0

  # Biometric auth
  local_auth: ^2.3.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^10.1.4
  csv: ^6.0.0
  shared_preferences: ^2.3.4

  # Filimport
  file_picker: ^8.1.6
  spreadsheet_decoder: ^2.3.0
  flutter_secure_storage: ^10.0.0

  # In-app purchase
  in_app_purchase: ^3.2.0

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.4

  # Google Drive backup
  google_sign_in: ^6.2.2
  googleapis: ^14.0.0
  http: ^1.2.2

  # Home screen widget
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  custom_lint:
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
